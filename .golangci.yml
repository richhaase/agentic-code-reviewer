version: "2"

run:
  timeout: 10m
  tests: true

linters:

  default: none
  enable:

    - govet
    - ineffassign
    - misspell
    - unused

    - errcheck

    - staticcheck

    - gosec

    - nolintlint

  exclusions:

    presets:
      - std-error-handling
      - common-false-positives

    rules:

      - path: _test\.go
        linters:
          - errcheck
          - gosec

  settings:
    misspell:
      locale: US

    errcheck:

      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - (*bufio.Writer).Flush
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Println
        - fmt.Printf
        - os.Remove
        - os.RemoveAll
        - os.Setenv
        - os.Unsetenv
        - os.Chdir

    gosec:
      excludes:

        - G104

        - G115

        - G204

        - G301

        - G302

        - G304

        - G306

        - G404

    nolintlint:

      require-explanation: true
      require-specific: true

output:
  formats:
    text:
      print-linter-name: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
