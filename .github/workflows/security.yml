name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Go
      uses: actions/setup-go@v7
      with:
        go-version-file: 'go.mod'

    - name: Run govulncheck
      run: |
        echo "Checking for vulnerabilities in dependencies..."
        go run golang.org/x/vuln/cmd/govulncheck@latest ./...

    - name: Run gosec
      run: |
        echo "Running security analysis..."
        go run github.com/securego/gosec/v2/cmd/gosec@latest -exclude=G104,G115,G204,G301,G302,G304,G306,G404 ./...
      continue-on-error: ${{ github.event_name == 'schedule' }}

    - name: Summary
      if: always()
      run: echo "Security checks completed. Review any findings above."
